name: Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    name: Release
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-tags: true
      - name: Release
        uses: quike/action-semantic-release@daf2d0ffd5b987539616e570c4eb72540ef604d5 # v3.3
        with:
          debug-mode: true
          dry-run: false
          default-config: true
          default-preset-info: true
          floating-tags: true
          add-summary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GHTOKEN }}
