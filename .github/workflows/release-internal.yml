name: Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    name: Release
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-tags: true
      - name: Release
        uses: quike/action-semantic-release@d83008bf8c399c31dd96f9fd732c5ad7f8cc1fce # v3.15
        with:
          debug-mode: true
          dry-run: false
          default-config: true
          default-preset-info: true
          floating-tags: true
          add-summary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GHTOKEN }}
