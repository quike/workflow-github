name: Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: read-all

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    name: Release
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-tags: true
      - name: Release
        uses: quike/action-semantic-release@3a3907462143b26dc079f0c6c29ce5eb087f2d28 # v3.9
        with:
          debug-mode: true
          dry-run: false
          default-config: true
          default-preset-info: true
          floating-tags: true
          add-summary: true
        env:
          GITHUB_TOKEN: ${{ secrets.GHTOKEN }}
